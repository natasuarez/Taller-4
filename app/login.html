<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="Luxury Cars es una empresa especializada en la venta de vehículos deportivos, sedanes y SUV de lujo. Descubre nuestro catálogo y encuentra el automóvil ideal.">
    <meta name="keywords"
        content="Luxury Cars, BMW, Mercedes-Benz, Ferrari, Porsche, venta de autos, vehículos de lujo">

    <meta name="author" content="Natalia Peña">

    <title>Iniciar Sesión | Luxury Cars</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-md-7 col-lg-5">

                <div class="card shadow-lg border-0">

                    <div class="card-body p-5">

                        <!-- Logo -->

                        <div class="text-center mb-4">

                            <i class="bi bi-car-front-fill text-warning display-2"></i>

                            <h2 class="fw-bold mt-3">

                                Luxury Cars

                            </h2>

                            <p class="text-secondary">

                                Inicia sesión para acceder a tu cuenta.

                            </p>

                        </div>

                        <!-- Formulario -->

                        <form>

                            <div class="form-floating mb-3">

                                <input type="email" class="form-control" id="correo" placeholder="Correo">

                                <label for="correo">

                                    <i class="bi bi-envelope-fill"></i>

                                    Correo electrónico

                                </label>

                            </div>

                            <div class="form-floating mb-3">

                                <input type="password" class="form-control" id="password" placeholder="Contraseña">

                                <label for="password">

                                    <i class="bi bi-lock-fill"></i>

                                    Contraseña

                                </label>

                            </div>

                            <div class="form-check mb-4">

                                <input class="form-check-input" type="checkbox" id="recordarme">

                                <label class="form-check-label" for="recordarme">

                                    Recordarme

                                </label>

                            </div>

                            <div class="d-grid gap-2">

                                <a href="cliente.html" class="btn btn-warning btn-lg">

                                    <i class="bi bi-person-fill"></i>

                                    Ingresar como Cliente

                                </a>

                                <a href="admin.html" class="btn btn-dark btn-lg">

                                    <i class="bi bi-shield-lock-fill"></i>

                                    Ingresar como Administrador

                                </a>

                            </div>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">

                            <p>

                                ¿No tienes una cuenta?

                                <a href="registro.html" class="text-decoration-none fw-bold">

                                    Regístrate

                                </a>

                            </p>

                            <p>

                                <a href="recuperar.html" class="text-decoration-none">

                                    ¿Olvidaste tu contraseña?

                                </a>

                            </p>

                            <a href="../index.html" class="btn btn-outline-dark">

                                <i class="bi bi-house-door-fill"></i>

                                Volver al inicio

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
