<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="Luxury Cars es una empresa especializada en la venta de vehículos deportivos, sedanes y SUV de lujo. Descubre nuestro catálogo y encuentra el automóvil ideal.">
    <meta name="keywords"
        content="Luxury Cars, BMW, Mercedes-Benz, Ferrari, Porsche, venta de autos, vehículos de lujo">

    <meta name="author" content="Natalia Peña">

    <title>Registro | Luxury Cars</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-9">

                <div class="card shadow border-0">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <i class="bi bi-person-plus-fill text-warning display-2"></i>

                            <h2 class="fw-bold mt-3">

                                Crear una cuenta

                            </h2>

                            <p class="text-secondary">

                                Regístrate para conocer nuestro catálogo de vehículos de lujo.

                            </p>

                        </div>

                        <form>

                            <!-- Nombre y Apellidos -->

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="text"
                                            class="form-control"
                                            id="nombre"
                                            placeholder="Nombre">

                                        <label for="nombre">

                                            Nombre

                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="text"
                                            class="form-control"
                                            id="apellido"
                                            placeholder="Apellido">

                                        <label for="apellido">

                                            Apellidos

                                        </label>

                                    </div>

                                </div>

                            </div>

                            <!-- Correo y Teléfono -->

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="email"
                                            class="form-control"
                                            id="correo"
                                            placeholder="Correo">

                                        <label for="correo">

                                            Correo electrónico

                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="tel"
                                            class="form-control"
                                            id="telefono"
                                            placeholder="Teléfono">

                                        <label for="telefono">

                                            Teléfono

                                        </label>

                                    </div>

                                </div>

                            </div>

                            <!-- Contraseñas -->

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="password"
                                            class="form-control"
                                            id="password"
                                            placeholder="Contraseña">

                                        <label for="password">

                                            Contraseña

                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="password"
                                            class="form-control"
                                            id="confirmar"
                                            placeholder="Confirmar">

                                        <label for="confirmar">

                                            Confirmar contraseña

                                        </label>

                                    </div>

                                </div>

                            </div>

                            <!-- Ciudad y Departamento -->

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <input
                                            type="text"
                                            class="form-control"
                                            id="ciudad"
                                            placeholder="Ciudad">

                                        <label for="ciudad">

                                            Ciudad

                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <div class="form-floating">

                                        <select class="form-select" id="departamento">

                                            <option selected>Antioquia</option>
                                            <option>Bogotá D.C.</option>
                                            <option>Valle del Cauca</option>
                                            <option>Cundinamarca</option>
                                            <option>Santander</option>

                                        </select>

                                        <label for="departamento">

                                            Departamento

                                        </label>

                                    </div>

                                </div>

                            </div>

                            <!-- Vehículo de interés -->

                            <div class="form-floating mb-3">

                                <select class="form-select" id="vehiculo">

                                    <option selected>BMW</option>
                                    <option>Mercedes-Benz</option>
                                    <option>Audi</option>
                                    <option>Ferrari</option>
                                    <option>Porsche</option>

                                </select>

                                <label for="vehiculo">

                                    Vehículo de interés

                                </label>

                            </div>

                            <!-- Términos -->

                            <div class="form-check mb-4">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="terminos">

                                <label
                                    class="form-check-label"
                                    for="terminos">

                                    Acepto los términos y condiciones.

                                </label>

                            </div>

                            <!-- Botones -->

                            <div class="d-grid gap-2">

                                <a href="login.html" class="btn btn-warning btn-lg">

                                    <i class="bi bi-person-check-fill"></i>

                                    Registrarme

                                </a>

                                <a href="login.html" class="btn btn-outline-secondary">

                                    Ya tengo una cuenta

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
