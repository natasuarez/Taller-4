<!DOCTYPE html>
<html lang="es-CO">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="Luxury Cars es una empresa especializada en la venta de vehículos deportivos, sedanes y SUV de lujo. Descubre nuestro catálogo y encuentra el automóvil ideal.">
    <meta name="keywords"
        content="Luxury Cars, BMW, Mercedes-Benz, Ferrari, Porsche, venta de autos, vehículos de lujo">

    <meta name="author" content="Natalia Peña">

    <title>Recuperar Contraseña | Luxury Cars</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-md-7 col-lg-5">

                <div class="card shadow border-0">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <i class="bi bi-shield-lock-fill text-warning display-2"></i>

                            <h2 class="fw-bold mt-3">

                                Recuperar Contraseña

                            </h2>

                            <p class="text-secondary">

                                Ingresa tu correo electrónico para recuperar el acceso a tu cuenta.

                            </p>

                        </div>

                        <form action="#" method="post">

                            <!-- Campo válido -->

                            <div class="form-floating mb-4">

                                <input type="email" class="form-control is-valid" id="correoValido"
                                    placeholder="correo">

                                <label for="correoValido">

                                    Correo registrado

                                </label>

                                <div class="valid-feedback">

                                    Correo encontrado correctamente.

                                </div>

                            </div>

                            <!-- Campo inválido -->

                            <div class="form-floating mb-4">

                                <input type="email" class="form-control is-invalid" id="correoInvalido"
                                    placeholder="correo">

                                <label for="correoInvalido">

                                    Correo no registrado

                                </label>

                                <div class="invalid-feedback">

                                    Correo no encontrado.

                                </div>

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-warning btn-lg">

                                    <i class="bi bi-envelope-check-fill"></i>

                                    Enviar enlace de recuperación

                                </button>

                            </div>

                        </form>

                        <hr>

                        <div class="text-center">

                            <a href="login.html" class="btn btn-outline-dark me-2">

                                <i class="bi bi-arrow-left-circle-fill"></i>

                                Volver al Login

                            </a>

                            <a href="../index.html" class="btn btn-outline-secondary">

                                <i class="bi bi-house-fill"></i>

                                Inicio

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer>
    </script>

</body>

</html>
